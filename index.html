<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Petualangan Shando</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu">
        <div class="glass-panel">
            <h1>Petualangan Shando</h1>
            <p>Bertahanlah dari rintangan!</p>
            <button onclick="startGame()">MULAI GAME</button>
        </div>
    </div>

    <div id="game">
        <div id="score">Score: 0</div>
        <div id="character"></div>
        <div id="block"></div>
        
        <div id="gameOverPanel">
            <h2>GAME OVER</h2>
            <p id="finalScore"></p>
            <button onclick="resetGame()">COBA LAGI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
